<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="description" content="Calculatrice scientifique professionnelle avec fonctions avancées">
    <meta name="theme-color" content="#1a1a2e">
    <title>ScientifIC Pro - Calculatrice Scientifique</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Orbitron:wght@500;700&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="calculator" role="application" aria-label="Calculatrice scientifique">
        <div class="brand">SCIENTIF<span style="color: var(--accent)">IC</span> PRO</div>
        
        <div class="display-container">
            <div class="mode-indicators">
                <span class="mode-indicator" id="degIndicator">DEG</span>
                <span class="mode-indicator" id="radIndicator">RAD</span>
                <span class="mode-indicator" id="2ndIndicator">2nd</span>
                <span class="mode-indicator" id="hypIndicator">HYP</span>
            </div>
            <div class="display" id="display" role="status" aria-live="polite">
                <div class="display-label">Expression</div>
                <div class="display-expression" id="expression"></div>
                <div class="display-label">Résultat</div>
                <div class="display-result" id="result">0</div>
            </div>
        </div>

        <div class="keyboard" role="group" aria-label="Pavé numérique">
            <div class="sci-row">
                <button class="btn btn-mode" data-action="mode" data-value="deg" aria-label="Mode degrés">DEG</button>
                <button class="btn btn-mode" data-action="mode" data-value="rad" aria-label="Mode radians">RAD</button>
                <button class="btn btn-mode" id="btn2nd" data-action="2nd" aria-label="Fonctions secondaires">2nd</button>
                <button class="btn btn-mode" id="btnHyp" data-action="hyp" aria-label="Fonctions hyperboliques">HYP</button>
                <button class="btn btn-sci" data-action="constant" data-value="pi" aria-label="Pi">π</button>
                <button class="btn btn-sci" data-action="constant" data-value="e" aria-label="Constante e">e</button>
            </div>

            <div class="sci-row">
                <button class="btn btn-sci" data-action="func" data-value="sin" aria-label="Sinus">sin</button>
                <button class="btn btn-sci" data-action="func" data-value="cos" aria-label="Cosinus">cos</button>
                <button class="btn btn-sci" data-action="func" data-value="tan" aria-label="Tangente">tan</button>
                <button class="btn btn-sci" data-action="func" data-value="ln" aria-label="Logarithme népérien">ln</button>
                <button class="btn btn-sci" data-action="func" data-value="log" aria-label="Logarithme décimal">log</button>
                <button class="btn btn-sci" data-action="func" data-value="sqrt" aria-label="Racine carrée">√</button>
            </div>

            <div class="sci-row">
                <button class="btn btn-sci" data-action="func" data-value="asin" aria-label="Sinus inverse">sin⁻¹</button>
                <button class="btn btn-sci" data-action="func" data-value="acos" aria-label="Cosinus inverse">cos⁻¹</button>
                <button class="btn btn-sci" data-action="func" data-value="atan" aria-label="Tangente inverse">tan⁻¹</button>
                <button class="btn btn-sci" data-action="func" data-value="pow" data-param="2" aria-label="Au carré">x²</button>
                <button class="btn btn-sci" data-action="func" data-value="cbrt" aria-label="Racine cubique">³√</button>
                <button class="btn btn-sci" data-action="func" data-value="fact" aria-label="Factorielle">n!</button>
            </div>

            <div class="sci-row">
                <button class="btn btn-sci" data-action="func" data-value="pow" data-param="y" aria-label="Puissance">x^y</button>
                <button class="btn btn-sci" data-action="func" data-value="exp" aria-label="Exponentielle">eˣ</button>
                <button class="btn btn-sci" data-action="func" data-value="pow10" aria-label="10 puissance">10ˣ</button>
                <button class="btn btn-sci" data-action="open" aria-label="Parenthèse ouvrante">(</button>
                <button class="btn btn-sci" data-action="close" aria-label="Parenthèse fermante">)</button>
                <button class="btn btn-sci" data-action="percent" aria-label="Pourcentage">%</button>
            </div>

            <div class="btn-row">
                <button class="btn btn-num" data-action="num" data-value="7" aria-label="7">7</button>
                <button class="btn btn-num" data-action="num" data-value="8" aria-label="8">8</button>
                <button class="btn btn-num" data-action="num" data-value="9" aria-label="9">9</button>
                <button class="btn btn-ops" data-action="op" data-value="divide" aria-label="Diviser">÷</button>
                <button class="btn btn-ops" data-action="clearEntry" aria-label="Effacer entrée">CE</button>
            </div>

            <div class="btn-row">
                <button class="btn btn-num" data-action="num" data-value="4" aria-label="4">4</button>
                <button class="btn btn-num" data-action="num" data-value="5" aria-label="5">5</button>
                <button class="btn btn-num" data-action="num" data-value="6" aria-label="6">6</button>
                <button class="btn btn-ops" data-action="op" data-value="multiply" aria-label="Multiplier">×</button>
                <button class="btn btn-ops" data-action="clear" aria-label="Tout effacer">AC</button>
            </div>

            <div class="btn-row">
                <button class="btn btn-num" data-action="num" data-value="1" aria-label="1">1</button>
                <button class="btn btn-num" data-action="num" data-value="2" aria-label="2">2</button>
                <button class="btn btn-num" data-action="num" data-value="3" aria-label="3">3</button>
                <button class="btn btn-ops" data-action="op" data-value="subtract" aria-label="Soustraire">−</button>
                <button class="btn btn-ops" data-action="memory" data-value="recall" aria-label="Rappel mémoire">MR</button>
            </div>

            <div class="btn-row">
                <button class="btn btn-num" data-action="num" data-value="0" aria-label="0">0</button>
                <button class="btn btn-num" data-action="decimal" aria-label="Virgule décimale">,</button>
                <button class="btn btn-num" data-action="negate" aria-label="Changer le signe">±</button>
                <button class="btn btn-ops" data-action="op" data-value="add" aria-label="Ajouter">+</button>
                <button class="btn btn-equals" data-action="equals" aria-label="Calculer">=</button>
            </div>

            <div class="btn-row">
                <button class="btn btn-sci" data-action="memory" data-value="store" aria-label="Mémoriser">MS</button>
                <button class="btn btn-sci" data-action="memory" data-value="add" aria-label="Ajouter à la mémoire">M+</button>
                <button class="btn btn-sci" data-action="memory" data-value="subtract" aria-label="Soustraire de la mémoire">M-</button>
                <button class="btn btn-sci" data-action="ans" aria-label="Dernier résultat">ANS</button>
                <button class="btn btn-ops" data-action="backspace" aria-label="Effacer dernier caractère">⌫</button>
            </div>
        </div>

        <div class="footer">KEYBOARD: 0-9 . = ENTER | +-*/ BACKSPACE ESC</div>
    </main>

    <script src="js/calculator.js"></script>
</body>
</html>
