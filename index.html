<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="description" content="Calculatrice scientifique professionnelle avec fonctions avancées">
    <meta name="theme-color" content="#1a1a2e">
    <title>ScientifIC Pro - Calculatrice Scientifique</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Orbitron:wght@500;700&family=VT323&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #e94560;
            --accent-dark: #b8344d;
            --lcd-bg: #c5c6a6;
            --lcd-text: #1a2820;
            --lcd-shadow: #9a9b86;
            --btn-num: #2d2d44;
            --btn-num-hover: #3d3d54;
            --btn-ops: #e94560;
            --btn-ops-hover: #ff5a75;
            --btn-sci: #0f3460;
            --btn-sci-hover: #1a4a80;
            --btn-mode: #1e5f4a;
            --btn-mode-hover: #2a7d62;
            --text-light: #eaeaea;
            --text-dim: #8888aa;
            --shadow: rgba(0, 0, 0, 0.4);
            --glow: rgba(233, 69, 96, 0.3);
        }

        html {
            font-size: 16px;
        }

        body {
            font-family: 'IBM Plex Sans', sans-serif;
            background: linear-gradient(145deg, #0f0f1a 0%, #1a1a2e 50%, #0f0f1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            overflow-x: hidden;
        }

        .calculator {
            background: linear-gradient(170deg, #2a2a40 0%, #1a1a2e 30%, #16162a 100%);
            border-radius: 24px;
            padding: 1.5rem;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.6),
                0 0 0 1px rgba(255, 255, 255, 0.05),
                inset 0 1px 0 rgba(255, 255, 255, 0.1),
                inset 0 -1px 0 rgba(0, 0, 0, 0.3);
            max-width: 420px;
            width: 100%;
            position: relative;
        }

        .calculator::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 4px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            border-radius: 2px;
        }

        .brand {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-light);
            text-align: center;
            letter-spacing: 3px;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }

        .display-container {
            background: var(--secondary);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
            box-shadow: 
                inset 0 2px 8px rgba(0, 0, 0, 0.4),
                0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .mode-indicators {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.75rem;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .mode-indicator {
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            background: var(--primary);
            color: var(--text-dim);
            transition: all 0.2s ease;
        }

        .mode-indicator.active {
            background: var(--btn-mode);
            color: var(--text-light);
            box-shadow: 0 0 10px rgba(30, 95, 74, 0.5);
        }

        .display {
            background: var(--lcd-bg);
            border-radius: 8px;
            padding: 1rem;
            min-height: 100px;
            position: relative;
            box-shadow: 
                inset 0 2px 4px rgba(0, 0, 0, 0.2),
                inset 0 -1px 2px rgba(255, 255, 255, 0.3),
                0 1px 0 rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .display::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 100%);
            pointer-events: none;
        }

        .display-label {
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 0.65rem;
            font-weight: 500;
            color: var(--lcd-shadow);
            letter-spacing: 1px;
            margin-bottom: 0.25rem;
            text-transform: uppercase;
        }

        .display-expression {
            font-family: 'VT323', monospace;
            font-size: 1.4rem;
            color: var(--lcd-text);
            word-break: break-all;
            line-height: 1.3;
            min-height: 1.8rem;
        }

        .display-result {
            font-family: 'VT323', monospace;
            font-size: 2.2rem;
            color: var(--lcd-text);
            text-align: right;
            margin-top: 0.5rem;
            text-shadow: 1px 1px 0 var(--lcd-shadow);
            animation: resultAppear 0.15s ease-out;
        }

        @keyframes resultAppear {
            from {
                opacity: 0;
                transform: translateX(10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .display.error .display-result {
            color: var(--accent);
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .keyboard {
            display: grid;
            gap: 0.5rem;
        }

        .btn-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.5rem;
        }

        .btn {
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 0.75rem 0.5rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.1s ease;
            position: relative;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 100%);
            pointer-events: none;
        }

        .btn-num {
            background: var(--btn-num);
            color: var(--text-light);
            box-shadow: 
                0 4px 0 #1a1a2a,
                0 6px 10px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .btn-num:hover {
            background: var(--btn-num-hover);
        }

        .btn-num:active {
            transform: translateY(2px);
            box-shadow: 
                0 2px 0 #1a1a2a,
                0 3px 5px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .btn-ops {
            background: var(--btn-ops);
            color: var(--text-light);
            box-shadow: 
                0 4px 0 var(--accent-dark),
                0 6px 10px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .btn-ops:hover {
            background: var(--btn-ops-hover);
        }

        .btn-ops:active {
            transform: translateY(2px);
            box-shadow: 
                0 2px 0 var(--accent-dark),
                0 3px 5px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .btn-sci {
            background: var(--btn-sci);
            color: var(--text-light);
            box-shadow: 
                0 4px 0 #0a2040,
                0 6px 10px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            font-size: 0.8rem;
        }

        .btn-sci:hover {
            background: var(--btn-sci-hover);
        }

        .btn-sci:active {
            transform: translateY(2px);
            box-shadow: 
                0 2px 0 #0a2040,
                0 3px 5px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .btn-mode {
            background: var(--btn-mode);
            color: var(--text-light);
            box-shadow: 
                0 4px 0 #145040,
                0 6px 10px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            font-size: 0.7rem;
        }

        .btn-mode:hover {
            background: var(--btn-mode-hover);
        }

        .btn-mode:active {
            transform: translateY(2px);
            box-shadow: 
                0 2px 0 #145040,
                0 3px 5px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .btn-mode.active {
            background: #2a9d72;
            box-shadow: 
                0 4px 0 #1a7d52,
                0 0 15px rgba(42, 157, 114, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .btn-wide {
            grid-column: span 2;
        }

        .btn-equals {
            background: linear-gradient(170deg, var(--accent) 0%, var(--accent-dark) 100%);
            box-shadow: 
                0 4px 0 #8a2a3a,
                0 6px 10px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2),
                0 0 20px rgba(233, 69, 96, 0.3);
        }

        .btn-equals:hover {
            background: linear-gradient(170deg, #ff5a75 0%, var(--accent) 100%);
        }

        .btn-equals:active {
            transform: translateY(2px);
            box-shadow: 
                0 2px 0 #8a2a3a,
                0 3px 5px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .sci-row {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 0.4rem;
            margin-bottom: 0.5rem;
        }

        .sci-row .btn {
            font-size: 0.7rem;
            padding: 0.6rem 0.3rem;
        }

        .footer {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.65rem;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        @media (max-width: 500px) {
            .calculator {
                padding: 1rem;
                border-radius: 16px;
            }

            .brand {
                font-size: 0.9rem;
            }

            .btn {
                padding: 0.65rem 0.4rem;
                font-size: 0.85rem;
                border-radius: 6px;
            }

            .btn-sci, .sci-row .btn {
                font-size: 0.65rem;
                padding: 0.5rem 0.2rem;
            }

            .display-result {
                font-size: 1.8rem;
            }

            .display-expression {
                font-size: 1.2rem;
            }

            .sci-row {
                gap: 0.3rem;
            }

            .btn-row {
                gap: 0.4rem;
            }
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 380px) {
            .btn-row {
                grid-template-columns: repeat(4, 1fr);
            }
            
            .sci-row {
                grid-template-columns: repeat(4, 1fr);
            }
            
            .btn-wide {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>
    <main class="calculator" role="application" aria-label="Calculatrice scientifique">
        <div class="brand">SCIENTIF<span style="color: var(--accent)">IC</span> PRO</div>
        
        <div class="display-container">
            <div class="mode-indicators">
                <span class="mode-indicator" id="degIndicator">DEG</span>
                <span class="mode-indicator" id="radIndicator">RAD</span>
                <span class="mode-indicator" id="2ndIndicator">2nd</span>
                <span class="mode-indicator" id="hypIndicator">HYP</span>
            </div>
            <div class="display" id="display" role="status" aria-live="polite">
                <div class="display-label">Expression</div>
                <div class="display-expression" id="expression"></div>
                <div class="display-label">Résultat</div>
                <div class="display-result" id="result">0</div>
            </div>
        </div>

        <div class="keyboard" role="group" aria-label="Pavé numérique">
            <div class="sci-row">
                <button class="btn btn-mode" data-action="mode" data-value="deg" aria-label="Mode degrés">DEG</button>
                <button class="btn btn-mode" data-action="mode" data-value="rad" aria-label="Mode radians">RAD</button>
                <button class="btn btn-mode" id="btn2nd" data-action="2nd" aria-label="Fonctions secondaires">2nd</button>
                <button class="btn btn-mode" id="btnHyp" data-action="hyp" aria-label="Fonctions hyperboliques">HYP</button>
                <button class="btn btn-sci" data-action="constant" data-value="pi" aria-label="Pi">π</button>
                <button class="btn btn-sci" data-action="constant" data-value="e" aria-label="Constante e">e</button>
            </div>

            <div class="sci-row">
                <button class="btn btn-sci" data-action="func" data-value="sin" aria-label="Sinus">sin</button>
                <button class="btn btn-sci" data-action="func" data-value="cos" aria-label="Cosinus">cos</button>
                <button class="btn btn-sci" data-action="func" data-value="tan" aria-label="Tangente">tan</button>
                <button class="btn btn-sci" data-action="func" data-value="ln" aria-label="Logarithme népérien">ln</button>
                <button class="btn btn-sci" data-action="func" data-value="log" aria-label="Logarithme décimal">log</button>
                <button class="btn btn-sci" data-action="func" data-value="sqrt" aria-label="Racine carrée">√</button>
            </div>

            <div class="sci-row">
                <button class="btn btn-sci" data-action="func" data-value="asin" aria-label="Sinus inverse">sin⁻¹</button>
                <button class="btn btn-sci" data-action="func" data-value="acos" aria-label="Cosinus inverse">cos⁻¹</button>
                <button class="btn btn-sci" data-action="func" data-value="atan" aria-label="Tangente inverse">tan⁻¹</button>
                <button class="btn btn-sci" data-action="func" data-value="pow" data-param="2" aria-label="Au carré">x²</button>
                <button class="btn btn-sci" data-action="func" data-value="cbrt" aria-label="Racine cubique">³√</button>
                <button class="btn btn-sci" data-action="func" data-value="fact" aria-label="Factorielle">n!</button>
            </div>

            <div class="sci-row">
                <button class="btn btn-sci" data-action="func" data-value="pow" data-param="y" aria-label="Puissance">x^y</button>
                <button class="btn btn-sci" data-action="func" data-value="exp" aria-label="Exponentielle">eˣ</button>
                <button class="btn btn-sci" data-action="func" data-value="pow10" aria-label="10 puissance">10ˣ</button>
                <button class="btn btn-sci" data-action="open" aria-label="Parenthèse ouvrante">(</button>
                <button class="btn btn-sci" data-action="close" aria-label="Parenthèse fermante">)</button>
                <button class="btn btn-sci" data-action="percent" aria-label="Pourcentage">%</button>
            </div>

            <div class="btn-row">
                <button class="btn btn-num" data-action="num" data-value="7" aria-label="7">7</button>
                <button class="btn btn-num" data-action="num" data-value="8" aria-label="8">8</button>
                <button class="btn btn-num" data-action="num" data-value="9" aria-label="9">9</button>
                <button class="btn btn-ops" data-action="op" data-value="divide" aria-label="Diviser">÷</button>
                <button class="btn btn-ops" data-action="clearEntry" aria-label="Effacer entrée">CE</button>
            </div>

            <div class="btn-row">
                <button class="btn btn-num" data-action="num" data-value="4" aria-label="4">4</button>
                <button class="btn btn-num" data-action="num" data-value="5" aria-label="5">5</button>
                <button class="btn btn-num" data-action="num" data-value="6" aria-label="6">6</button>
                <button class="btn btn-ops" data-action="op" data-value="multiply" aria-label="Multiplier">×</button>
                <button class="btn btn-ops" data-action="clear" aria-label="Tout effacer">AC</button>
            </div>

            <div class="btn-row">
                <button class="btn btn-num" data-action="num" data-value="1" aria-label="1">1</button>
                <button class="btn btn-num" data-action="num" data-value="2" aria-label="2">2</button>
                <button class="btn btn-num" data-action="num" data-value="3" aria-label="3">3</button>
                <button class="btn btn-ops" data-action="op" data-value="subtract" aria-label="Soustraire">−</button>
                <button class="btn btn-ops" data-action="memory" data-value="recall" aria-label="Rappel mémoire">MR</button>
            </div>

            <div class="btn-row">
                <button class="btn btn-num" data-action="num" data-value="0" aria-label="0">0</button>
                <button class="btn btn-num" data-action="decimal" aria-label="Virgule décimale">,</button>
                <button class="btn btn-num" data-action="negate" aria-label="Changer le signe">±</button>
                <button class="btn btn-ops" data-action="op" data-value="add" aria-label="Ajouter">+</button>
                <button class="btn btn-equals" data-action="equals" aria-label="Calculer">=</button>
            </div>

            <div class="btn-row">
                <button class="btn btn-sci" data-action="memory" data-value="store" aria-label="Mémoriser">MS</button>
                <button class="btn btn-sci" data-action="memory" data-value="add" aria-label="Ajouter à la mémoire">M+</button>
                <button class="btn btn-sci" data-action="memory" data-value="subtract" aria-label="Soustraire de la mémoire">M-</button>
                <button class="btn btn-sci" data-action="ans" aria-label="Dernier résultat">ANS</button>
                <button class="btn btn-ops" data-action="backspace" aria-label="Effacer dernier caractère">⌫</button>
            </div>
        </div>

        <div class="footer">KEYBOARD: 0-9 . = ENTER | +-*/ BACKSPACE ESC</div>
    </main>

    <script>
    (function() {
        'use strict';

        const PI = Math.PI;
        const E = Math.E;
        const MAX_RESULT = 1e308;
        const MIN_RESULT = -1e308;

        const state = {
            expression: '',
            result: '0',
            memory: 0,
            isRadian: false,
            isSecondFunc: false,
            isHyperbolic: false,
            hasError: false,
            lastAnswer: null,
            openParens: 0,
            lastWasOperator: false,
            calculationCount: 0,
            lastCalcTime: 0
        };

        const tokens = {
            num: /^-?\d+\.?\d*$/,
            op: /^[\+\-\×\÷\+\−\−\×\÷]$/
        };

        const display = {
            el: document.getElementById('display'),
            expr: document.getElementById('expression'),
            result: document.getElementById('result')
        };

        const indicators = {
            deg: document.getElementById('degIndicator'),
            rad: document.getElementById('radIndicator'),
            '2nd': document.getElementById('2ndIndicator'),
            hyp: document.getElementById('hypIndicator')
        };

        function sanitize(str) {
            if (typeof str !== 'string') return '0';
            return str.replace(/[<>\"\'\\]/g, '').trim();
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function updateDisplay() {
            display.expr.textContent = escapeHtml(state.expression) || ' ';
            display.result.textContent = state.hasError ? 'Error' : escapeHtml(state.result);
            
            if (state.hasError) {
                display.el.classList.add('error');
            } else {
                display.el.classList.remove('error');
            }
        }

        function updateIndicators() {
            indicators.deg.classList.toggle('active', !state.isRadian);
            indicators.rad.classList.toggle('active', state.isRadian);
            indicators['2nd'].classList.toggle('active', state.isSecondFunc);
            indicators.hyp.classList.toggle('active', state.isHyperbolic);

            const sinBtn = document.querySelector('[data-value="sin"]');
            const cosBtn = document.querySelector('[data-value="cos"]');
            const tanBtn = document.querySelector('[data-value="tan"]');

            if (state.isSecondFunc) {
                sinBtn.textContent = 'sin⁻¹';
                cosBtn.textContent = 'cos⁻¹';
                tanBtn.textContent = 'tan⁻¹';
            } else {
                sinBtn.textContent = 'sin';
                cosBtn.textContent = 'cos';
                tanBtn.textContent = 'tan';
            }
        }

        function rateLimit() {
            const now = Date.now();
            if (now - state.lastCalcTime < 50 && state.calculationCount > 5) {
                return false;
            }
            state.lastCalcTime = now;
            state.calculationCount = Math.max(0, state.calculationCount - 1);
            return true;
        }

        function toRadians(value) {
            return state.isRadian ? value : (value * PI / 180);
        }

        function fromRadians(value) {
            return state.isRadian ? value : (value * 180 / PI);
        }

        function factorial(n) {
            n = Math.floor(n);
            if (n < 0) return NaN;
            if (n > 170) return Infinity;
            if (n === 0 || n === 1) return 1;
            let result = 1;
            for (let i = 2; i <= n; i++) {
                result *= i;
            }
            return result;
        }

        function safeUnary(func) {
            try {
                const val = parseFloat(state.result);
                if (isNaN(val)) return 'Error';
                if (!isFinite(val) && val !== 0) return val > 0 ? 'Infinity' : '-Infinity';
                const result = func(val);
                if (typeof result !== 'number' || isNaN(result)) return 'Error';
                if (!isFinite(result)) return result > 0 ? 'Infinity' : '-Infinity';
                if (Math.abs(result) > MAX_RESULT) return 'Overflow';
                return String(result);
            } catch (e) {
                return 'Error';
            }
        }

        const mathFuncs = {
            sin: (v) => Math.sin(toRadians(v)),
            cos: (v) => Math.cos(toRadians(v)),
            tan: (v) => Math.tan(toRadians(v)),
            asin: (v) => fromRadians(Math.asin(v)),
            acos: (v) => fromRadians(Math.acos(v)),
            atan: (v) => fromRadians(Math.atan(v)),
            sinh: (v) => Math.sinh(v),
            cosh: (v) => Math.cosh(v),
            tanh: (v) => Math.tanh(v),
            asinh: (v) => Math.asinh(v),
            acosh: (v) => Math.acosh(v),
            atanh: (v) => Math.atanh(v),
            ln: (v) => Math.log(v),
            log: (v) => Math.log10(v),
            exp: (v) => Math.exp(v),
            pow10: (v) => Math.pow(10, v),
            sqrt: (v) => Math.sqrt(v),
            cbrt: (v) => Math.cbrt(v),
            fact: (v) => factorial(v)
        };

        function applyFunction(funcName) {
            if (funcName === 'pow') {
                state.expression += '^';
                state.lastWasOperator = false;
                updateDisplay();
                return;
            }

            let func = mathFuncs[funcName];

            if (state.isHyperbolic) {
                const hypMap = {
                    sin: 'sinh', cos: 'cosh', tan: 'tanh',
                    asin: 'asinh', acos: 'acosh', atan: 'atanh'
                };
                if (hypMap[funcName]) {
                    func = mathFuncs[hypMap[funcName]];
                }
            }

            if (func) {
                state.result = safeUnary(func);
                state.expression += funcName + '(';
                state.openParens++;
                state.lastWasOperator = false;
                updateDisplay();
            }
        }

        function handleNumber(num) {
            if (state.hasError) {
                state.result = '0';
                state.expression = '';
                state.hasError = false;
            }
            if (state.result === '0' && num !== '.') {
                state.result = num;
            } else if (num === '.' && state.result.includes('.')) {
                return;
            } else {
                state.result += num;
            }
            state.lastWasOperator = false;
            updateDisplay();
        }

        function handleOperator(op) {
            if (state.hasError) return;
            
            const opSymbols = {
                add: '+',
                subtract: '−',
                multiply: '×',
                divide: '÷'
            };

            if (state.lastWasOperator) {
                state.expression = state.expression.slice(0, -1);
            }

            state.expression += state.result + ' ' + opSymbols[op] + ' ';
            state.result = '0';
            state.lastWasOperator = true;
            state.openParens = 0;
            updateDisplay();
        }

        function handleEquals() {
            if (!rateLimit()) return;
            if (state.hasError) return;

            try {
                let expr = state.expression + ' ' + state.result;
                expr = expr.replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-');
                expr = expr.replace(/π/g, String(PI)).replace(/e(?![x])/g, String(E));

                const tokens = tokenize(expr);
                if (!tokens) {
                    state.hasError = true;
                    updateDisplay();
                    return;
                }

                const result = evaluate(tokens);
                if (typeof result !== 'number' || isNaN(result)) {
                    state.hasError = true;
                } else if (!isFinite(result)) {
                    state.hasError = true;
                    state.result = result > 0 ? 'Infinity' : '-Infinity';
                } else if (Math.abs(result) > MAX_RESULT) {
                    state.hasError = true;
                    state.result = 'Overflow';
                } else {
                    state.result = formatResult(result);
                    state.lastAnswer = result;
                }
            } catch (e) {
                state.hasError = true;
            }

            state.expression = '';
            state.calculationCount++;
            updateDisplay();
        }

        function tokenize(expr) {
            const tokens = [];
            const numRegex = /^-?\d+\.?\d*$/;
            let current = '';
            
            for (let i = 0; i < expr.length; i++) {
                const char = expr[i];
                
                if (char === ' ' && !current.match(/^\d+\.?\d*$/)) {
                    continue;
                }
                
                if (char.match(/\d/) || char === '.' || (char === '-' && (current === '' || current === '(' || current.match(/[\+\-\*\/\(\^]/)))) {
                    current += char;
                } else if (char === '-' && current === '') {
                    current = '-';
                } else if (char.match(/[\+\-\*\/\(\)\^]/)) {
                    if (current) {
                        if (current.match(numRegex)) {
                            tokens.push({ type: 'number', value: parseFloat(current) });
                        }
                        current = '';
                    }
                    tokens.push({ type: 'operator', value: char });
                } else if (current.match(numRegex)) {
                    tokens.push({ type: 'number', value: parseFloat(current) });
                    current = '';
                    i--;
                }
            }
            
            if (current) {
                if (current.match(numRegex)) {
                    tokens.push({ type: 'number', value: parseFloat(current) });
                }
            }
            
            return tokens.length > 0 ? tokens : null;
        }

        function evaluate(tokens) {
            const output = [];
            const ops = [];
            
            const precedence = { '+': 1, '-': 1, '*': 2, '/': 2, '^': 3 };
            const associativity = { '+': 'left', '-': 'left', '*': 'left', '/': 'left', '^': 'right' };
            
            for (const token of tokens) {
                if (token.type === 'number') {
                    output.push(token.value);
                } else if (token.type === 'operator') {
                    while (ops.length > 0) {
                        const top = ops[ops.length - 1];
                        if (top === '(') break;
                        if (precedence[top] > precedence[token.value] ||
                            (precedence[top] === precedence[token.value] && associativity[token.value] === 'left')) {
                            output.push(ops.pop());
                        } else {
                            break;
                        }
                    }
                    ops.push(token.value);
                } else if (token.value === '(') {
                    ops.push(token.value);
                } else if (token.value === ')') {
                    while (ops.length > 0 && ops[ops.length - 1] !== '(') {
                        output.push(ops.pop());
                    }
                    if (ops.length === 0) return NaN;
                    ops.pop();
                }
            }
            
            while (ops.length > 0) {
                const op = ops.pop();
                if (op === '(' || op === ')') return NaN;
                output.push(op);
            }
            
            const stack = [];
            for (const item of output) {
                if (typeof item === 'number') {
                    stack.push(item);
                } else {
                    if (stack.length < 2) return NaN;
                    const b = stack.pop();
                    const a = stack.pop();
                    let result;
                    switch (item) {
                        case '+': result = a + b; break;
                        case '-': result = a - b; break;
                        case '*': result = a * b; break;
                        case '/': result = b === 0 ? Infinity : a / b; break;
                        case '^': result = Math.pow(a, b); break;
                        default: return NaN;
                    }
                    stack.push(result);
                }
            }
            
            return stack.length === 1 ? stack[0] : NaN;
        }

        function formatResult(num) {
            if (Math.abs(num) < 1e-10) return '0';
            if (Math.abs(num) >= 1e10 || (Math.abs(num) < 1e-6 && num !== 0)) {
                return num.toExponential(8);
            }
            const str = String(num);
            if (str.length > 12) {
                return parseFloat(num.toPrecision(10)).toString();
            }
            return str;
        }

        function handleClear() {
            state.expression = '';
            state.result = '0';
            state.hasError = false;
            state.openParens = 0;
            state.lastWasOperator = false;
            updateDisplay();
        }

        function handleClearEntry() {
            state.result = '0';
            updateDisplay();
        }

        function handleBackspace() {
            if (state.hasError) {
                handleClear();
                return;
            }
            if (state.result.length > 1) {
                state.result = state.result.slice(0, -1);
            } else {
                state.result = '0';
            }
            updateDisplay();
        }

        function handleDecimal() {
            if (state.hasError) {
                state.result = '0';
                state.hasError = false;
            }
            if (!state.result.includes('.')) {
                state.result += '.';
            }
            updateDisplay();
        }

        function handleNegate() {
            if (state.hasError) return;
            const val = parseFloat(state.result);
            if (val === 0) return;
            state.result = String(-val);
            updateDisplay();
        }

        function handlePercent() {
            if (state.hasError) return;
            const val = parseFloat(state.result);
            state.result = String(val / 100);
            updateDisplay();
        }

        function handleAns() {
            if (state.lastAnswer !== null) {
                state.result = formatResult(state.lastAnswer);
                updateDisplay();
            }
        }

        function handleMemory(action) {
            const current = parseFloat(state.result);
            switch (action) {
                case 'store':
                    state.memory = isNaN(current) ? 0 : current;
                    break;
                case 'recall':
                    state.result = formatResult(state.memory);
                    break;
                case 'add':
                    state.memory += isNaN(current) ? 0 : current;
                    break;
                case 'subtract':
                    state.memory -= isNaN(current) ? 0 : current;
                    break;
            }
            updateDisplay();
        }

        function handleParenthesis(type) {
            if (state.hasError) {
                state.expression = '';
                state.hasError = false;
            }
            if (type === 'open') {
                state.expression += '(';
                state.openParens++;
            } else if (type === 'close' && state.openParens > 0) {
                state.expression += ')';
                state.openParens--;
            }
            updateDisplay();
        }

        function handleConstant(name) {
            if (state.hasError) {
                state.result = '0';
                state.expression = '';
                state.hasError = false;
            }
            state.result = name === 'pi' ? formatResult(PI) : formatResult(E);
            updateDisplay();
        }

        function handleMode(mode) {
            state.isRadian = (mode === 'rad');
            updateIndicators();
        }

        function toggle2nd() {
            state.isSecondFunc = !state.isSecondFunc;
            updateIndicators();
        }

        function toggleHyp() {
            state.isHyperbolic = !state.isHyperbolic;
            updateIndicators();
        }

        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                const action = this.dataset.action;
                const value = this.dataset.value;
                const param = this.dataset.param;

                switch (action) {
                    case 'num':
                        handleNumber(value);
                        break;
                    case 'op':
                        handleOperator(value);
                        break;
                    case 'equals':
                        handleEquals();
                        break;
                    case 'clear':
                        handleClear();
                        break;
                    case 'clearEntry':
                        handleClearEntry();
                        break;
                    case 'backspace':
                        handleBackspace();
                        break;
                    case 'decimal':
                        handleDecimal();
                        break;
                    case 'negate':
                        handleNegate();
                        break;
                    case 'percent':
                        handlePercent();
                        break;
                    case 'ans':
                        handleAns();
                        break;
                    case 'func':
                        applyFunction(param === 'y' ? 'pow' : value);
                        if (param === 'y') {
                            state.result = '0';
                        }
                        break;
                    case 'memory':
                        handleMemory(value);
                        break;
                    case 'mode':
                        handleMode(value);
                        break;
                    case '2nd':
                        toggle2nd();
                        break;
                    case 'hyp':
                        toggleHyp();
                        break;
                    case 'open':
                    case 'close':
                        handleParenthesis(action);
                        break;
                    case 'constant':
                        handleConstant(value);
                        break;
                }
            });
        });

        document.addEventListener('keydown', function(e) {
            const key = e.key;
            
            if (/^[0-9]$/.test(key)) {
                e.preventDefault();
                handleNumber(key);
            } else if (key === '.') {
                e.preventDefault();
                handleDecimal();
            } else if (key === '+') {
                e.preventDefault();
                handleOperator('add');
            } else if (key === '-') {
                e.preventDefault();
                handleOperator('subtract');
            } else if (key === '*') {
                e.preventDefault();
                handleOperator('multiply');
            } else if (key === '/') {
                e.preventDefault();
                handleOperator('divide');
            } else if (key === 'Enter' || key === '=') {
                e.preventDefault();
                handleEquals();
            } else if (key === 'Escape') {
                e.preventDefault();
                handleClear();
            } else if (key === 'Backspace') {
                e.preventDefault();
                handleBackspace();
            } else if (key === '%') {
                e.preventDefault();
                handlePercent();
            } else if (key === '(' || key === ')') {
                e.preventDefault();
                handleParenthesis(key === '(' ? 'open' : 'close');
            }
        });

        updateIndicators();
        updateDisplay();
    })();
    </script>
</body>
</html>
